<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Ecommerce - Responsif dengan Gambar Keranjang</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }
        .card-img-top {
            height: 200px;
            object-fit: cover;
            background-color: #f8f9fa;
        }
        .navbar {
            background-color: #f8f9fa !important;
        }
        .offcanvas {
            background-color: #ffffff;
        }
        .toast {
            background-color: #fff;
            border-left: 4px solid #28a745;
        }
        /* Agar tombol search dan cart tidak bertumpuk di mobile */
        @media (max-width: 576px) {
            .navbar .container {
                flex-direction: column;
                align-items: stretch;
            }
            .navbar form {
                width: 100%;
                margin-top: 0.5rem;
            }
            .navbar .btn-primary {
                width: 100%;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Navbar -->
    <nav class="navbar navbar-light bg-light flex-wrap py-3">
        <div class="container-fluid px-0">
            <a class="navbar-brand fw-bold fs-4" href="#">🛍️ Mini Ecommerce</a>
            <form class="d-flex my-2 my-lg-0" id="formItem" style="max-width: 400px;">
                <input class="form-control me-2" type="search" placeholder="Cari barang..." id="keyword">
                <button class="btn btn-outline-success" type="submit">
                    <i class="fas fa-search"></i> Cari
                </button>
            </form>
            <button class="btn btn-primary position-relative" id="cart" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas" aria-controls="cartOffcanvas">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge bg-danger rounded-pill" id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <!-- Daftar Produk -->
    <div class="row mt-4 g-4" id="listBarang"></div>
</div>

<!-- Offcanvas Keranjang -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="cartOffcanvasLabel">
            <i class="fas fa-shopping-cart me-2"></i>Keranjang Belanja
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
        <!-- Tempat daftar item keranjang -->
        <div id="cartItemsContainer" class="flex-grow-1">
            <!-- Akan diisi oleh JavaScript -->
        </div>
        <hr>
        <div class="d-flex justify-content-between fw-bold">
            <span><i class="fas fa-shopping-cart me-2"></i>Total:</span>
            <span id="cartTotal">Rp 0</span>
        </div>
        <button class="btn btn-success w-100 mt-3" id="checkoutBtn" disabled>
            <i class="fas fa-check-circle me-2"></i>Checkout
        </button>
    </div>
</div>

<!-- Toast Notifikasi -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="2000">
        <div class="toast-header">
            <i class="fas fa-check-circle text-success me-2"></i>
            <strong class="me-auto">Berhasil</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body">
            Barang ditambahkan ke keranjang.
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Data produk (id, nama, harga, deskripsi, gambar) — gunakan nama file lokal
    const items = [
        ['001', 'Keyboard Logitek', 60000, 'Keyboard yang mantap untuk kantoran', 'logitek.jpg'],
        ['002', 'Keyboard MSI', 300000, 'Keyboard gaming MSI mekanik', 'msi.jpg'],
        ['003', 'Mouse Genius', 50000, 'Mouse Genius biar lebih pinter', 'genius.jpeg'],
        ['004', 'Mouse Jerry', 30000, 'Mouse yang disukai kucing', 'jerry.jpg']
    ];

    // Elemen DOM
    const listBarang = document.getElementById("listBarang");
    const formItem = document.getElementById("formItem");
    const keyword = document.getElementById("keyword");
    const cartCountSpan = document.getElementById("cartCount");
    const cartItemsContainer = document.getElementById("cartItemsContainer");
    const cartTotalSpan = document.getElementById("cartTotal");
    const checkoutBtn = document.getElementById("checkoutBtn");
    const toastLive = document.getElementById('liveToast');
    let toast;

    let cart = [];

    function formatRupiah(angka) {
        return 'Rp ' + angka.toLocaleString('id-ID');
    }

    // Tampilkan produk
    function tampilkanBarang(data) {
        listBarang.innerHTML = "";

        for (let i = 0; i < data.length; i++) {
            const [id, nama, harga, deskripsi, gambar] = data[i];
            listBarang.innerHTML += `
                <div class="col-12 col-sm-6 col-lg-3">
                    <div class="card h-100">
                        <img src="${gambar}" class="card-img-top" alt="${nama}" 
                             onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22200%22%20height%3D%22200%22%20viewBox%3D%220%200%20200%20200%22%3E%3Crect%20width%3D%22200%22%20height%3D%22200%22%20fill%3D%22%23e9ecef%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20font-family%3D%22system-ui%2C%20sans-serif%22%20font-size%3D%2218%22%20fill%3D%22%236c757d%22%3EGambar%20Tidak%20Tersedia%3C%2Ftext%3E%3C%2Fsvg%3E';">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${nama}</h5>
                            <p class="card-text small text-muted">${deskripsi}</p>
                            <p class="card-text fw-bold text-primary fs-5">${formatRupiah(harga)}</p>
                            <button class="btn btn-sm btn-outline-primary mt-auto addCart" 
                                    data-id="${id}" 
                                    data-name="${nama}" 
                                    data-price="${harga}">
                                <i class="fas fa-cart-plus me-1"></i>Tambahkan
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        document.querySelectorAll('.addCart').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const id = this.dataset.id;
                const name = this.dataset.name;
                const price = parseInt(this.dataset.price);
                tambahKeKeranjang(id, name, price);
            });
        });
    }

    function tambahKeKeranjang(id, name, price) {
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.qty += 1;
        } else {
            cart.push({ id, name, price, qty: 1 });
        }
        perbaruiKeranjang();
        if (toast) toast.show();
    }

    function hapusDariKeranjang(id) {
        cart = cart.filter(item => item.id !== id);
        perbaruiKeranjang();
    }

    function perbaruiKeranjang() {
        const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
        cartCountSpan.innerText = totalItems;

        const totalHarga = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        cartTotalSpan.innerText = formatRupiah(totalHarga);

        if (cart.length === 0) {
            // Tampilkan gambar/ikon keranjang kosong
            cartItemsContainer.innerHTML = `
                <div class="text-center py-5">
                    <i class="fas fa-shopping-cart fa-4x text-muted mb-3"></i>
                    <p class="text-muted">Keranjang belanja Anda kosong.</p>
                </div>
            `;
            checkoutBtn.disabled = true;
        } else {
            let html = '';
            cart.forEach(item => {
                html += `
                    <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
                        <div class="flex-grow-1">
                            <h6 class="mb-0">${item.name}</h6>
                            <small class="text-muted">${formatRupiah(item.price)} x ${item.qty}</small>
                        </div>
                        <div class="d-flex align-items-center">
                            <span class="fw-bold me-3">${formatRupiah(item.price * item.qty)}</span>
                            <button class="btn btn-sm btn-outline-danger remove-item" data-id="${item.id}">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            cartItemsContainer.innerHTML = html;
            checkoutBtn.disabled = false;

            document.querySelectorAll('.remove-item').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.id;
                    hapusDariKeranjang(id);
                });
            });
        }
    }

    // Inisialisasi
    tampilkanBarang(items);

    formItem.addEventListener("submit", function(event) {
        event.preventDefault();
        const kataKunci = keyword.value.trim().toLowerCase();
        if (kataKunci === '') {
            tampilkanBarang(items);
            return;
        }
        const hasilFilter = items.filter(item => 
            item[1].toLowerCase().includes(kataKunci)
        );
        if (hasilFilter.length === 0) {
            listBarang.innerHTML = '<div class="col-12"><div class="alert alert-warning text-center">Barang tidak ditemukan.</div></div>';
        } else {
            tampilkanBarang(hasilFilter);
        }
        keyword.value = '';
    });

    document.addEventListener('DOMContentLoaded', function() {
        const toastElement = document.getElementById('liveToast');
        if (toastElement) {
            toast = new bootstrap.Toast(toastElement);
        }
    });
</script>

<!-- Catatan: Letakkan file gambar (logitek.jpg, msi.jpg, genius.jpeg, jerry.jpg) di folder yang sama dengan file HTML -->
</body>
</html>
